server:
  port: 8080
  servlet:
    context-path: /mcpservice

spring:
  datasource:
    url: jdbc:hsqldb:mem:companydb
    driver-class-name: org.hsqldb.jdbc.JDBCDriver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: always
springdoc:
  swagger-ui:
    path: /swagger-ui.html
